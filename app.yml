apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-apache-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      imagePullSecrets:
        - name: aws-ecr-secret
      containers:
        - name: apache-container
          image: 380277571862.dkr.ecr.eu-west-1.amazonaws.com/my-html-app:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-apache-service
spec:
  type: NodePort
  selector:
    app: apache
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30511