name: Deploy K3s app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: eu-west-1
      ECR_REPOSITORY: my-html-app
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || aws ecr create-repository --repository-name $ECR_REPOSITORY
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 380277571862.dkr.ecr.eu-west-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t 380277571862.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push 380277571862.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH key for Ansible
        shell: bash
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            sudo apt-get install -y openssh-client
            HOST_IP=$(grep -E '^[0-9]' inventory.ini | awk '{print $1}' | head -n1)
            if [ -n "$HOST_IP" ]; then
              ssh-keyscan -H "$HOST_IP" >> ~/.ssh/known_hosts
            fi
          else
            echo "SSH_PRIVATE_KEY secret not set; skipping SSH setup"
          fi

      - name: Run Ansible playbook
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini ansible/playbook.yml --private-key ~/.ssh/id_ed25519
